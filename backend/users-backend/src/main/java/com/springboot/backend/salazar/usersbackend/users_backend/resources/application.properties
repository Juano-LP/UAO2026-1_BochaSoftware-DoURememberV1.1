spring.application.name=users-backend
spring.datasource.url=jdbc:mysql://localhost:3306/db_backend_users
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
# HU01 - Notificaciones (email + scheduler)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
notifications.mail.from=${NOTIFICATIONS_MAIL_FROM:${MAIL_USERNAME:}}
notifications.daily-lesson.cron=${NOTIFICATIONS_DAILY_LESSON_CRON:0 0 8 * * *}